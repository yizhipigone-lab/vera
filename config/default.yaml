# VERA 量化回测系统 — 默认全局配置
# 所有策略继承此配置，策略文件可覆写任意字段

# === Strategy Identity ===
strategy:
  name: "VERA"
  version: "1.0.0"
  description: ""

# === TDX Connection ===
tdx:
  install_path: "E:/NEW_TDX"
  tqcenter_path: "E:/NEW_TDX/PYPlugins/user/tqcenter.py"

# === Selection ===
selection:
  formula_name: "UPN"
  formula_arg: "3"
  universe:
    type: "50"                  # 沪深A股
    exclude_st: true
    exclude_new_listings_days: 60
    include_etf: false          # P-v3.4: A股 + ETF 混合 (list_type=31)
    etf_only: false             # P-v3.4: 仅 ETF (list_type=31, 含 51/56/58/511, 排除 501/508)
    sectors: []                 # P-v3.4: 行业板块代码列表 (list_type=11), 如 ["881319.SH"]
  period: "1d"
  dividend_type: 1              # 前复权

# === Time Range (策略文件覆盖) ===
time_range:
  start: "20240101"
  end: "20251231"

# === Backtest ===
backtest:
  initial_capital: 1000000.0
  commission: 0.0003            # 万三
  slippage: 0.001               # 0.1%
  stamp_tax: 0.0005             # A股卖出单边印花税
  enable_realistic_costs: true  # 默认含印花税+滑点（老脚本可传 false 复现零成本基线）
  freq: "1d"
  position_sizing:
    min_buy_amount: 2000.0
    max_buy_amount: 20000.0
    lot_size: 100
    min_lots: 1

# === Stop-Profit / Stop-Loss ===
stop_loss:
  # 2026-07-05: 优先级 (一个 BAR 内同 bar 双触发时谁先赢)
  #   stop_first      = cost_stop > ladder_tp > trailing > time (历史默认, 止损优先)
  #   ladder_tp_first = ladder_tp > cost_stop > trailing > time (阶梯止盈优先)
  #   trailing_first  = ladder_tp > trailing > cost_stop > time (移动止损优先, 当前默认)
  # 注: formula_sell (reason=12) 仍最高优先级, 不受此开关影响
  # 注: trailing 语义 = 盘中 Low 触及回撤线即触发, 按回撤线价执行 (含跳空低开保护)
  priority: trailing_first
  cost_stop:
    enabled: true
    threshold: -0.12
  trailing_stop:
    enabled: true
    activation: 0.035
    drawdown: 0.01
  ladder_tp:
    enabled: true
    levels:
      - profit: 0.06
        sell_ratio: 0.30
      - profit: 0.15
        sell_ratio: 0.30
  time_stop:
    enabled: true
    max_hold_days: 20
  # P-v3.4: 公式卖出 — TDX 信号驱动, 最高优先级 (priority 数字越小越优先)
  # 触发: 持仓股在某条 TDX 公式下命中信号 (TDX 返回 Value=1)
  # 默认 enabled=false (安全优先); 启用时需正确填写 formula_name
  formula_sell:
    enabled: false
    formula_name: "卖出XG"          # 占位 — 待真实公式确认后替换
    formula_arg: ""                 # 公式参数, 多数公式留空
    sell_ratio: 1.0                 # 1=全卖, 0.4=卖40%
    priority: 0                     # 0=最高优先级 (早于 cost_stop)
  # 候选 A 阶段 1: 三类能力开关 (默认全开; 数据未提供时对应能力自然 off)
  # 与 formula_sell.enabled 正交: formula_sell.enabled 控制是否调 TDX 建矩阵;
  # capabilities.formula_exit 控制 run_cached 是否用传入的 formula_exit_np 矩阵。
  capabilities:
    formula_exit: true     # 有 formula_exit_np 时启用公式卖出 (reason=12)
    gap_protection: true   # 有 open_np 时 cost_stop 跳空低开取 min(stop_price, open)
    delisting: true        # 有 tradable_np 时退市强制平仓 (reason=11)

# === Benchmark ===
benchmark:
  indices:
    - "shanghai"
    - "hs300"
    - "zz500"
    - "chuangyeban"
    - "kechuang50"
    - "zhongzhengA500"
  normalize_start: true

# === Report ===
report:
  formats: ["html", "json"]
  include_trade_log: true
  include_benchmark_chart: true
  plot_engine: "plotly"         # plotly | matplotlib | both
  dpi: 300
  output_dir: ""                # 空则使用 output/reports/

# === Logging ===
logging:
  level: "INFO"
  file: ""                      # 空则仅控制台
  max_size_mb: 100
  backup_count: 5
