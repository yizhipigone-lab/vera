# VERA 量化回测系统 — 默认全局配置
# 所有策略继承此配置，策略文件可覆写任意字段

# === Strategy Identity ===
strategy:
  name: "VERA"
  version: "1.0.0"
  description: ""

# === TDX Connection ===
tdx:
  install_path: "E:/NEW_TDX"
  tqcenter_path: "E:/NEW_TDX/PYPlugins/user/tqcenter.py"

# === Selection ===
selection:
  formula_name: "UPN"
  formula_arg: "3"
  universe:
    type: "50"                  # 沪深A股
    exclude_st: true
    exclude_new_listings_days: 60
  period: "1d"
  dividend_type: 1              # 前复权

# === Time Range (策略文件覆盖) ===
time_range:
  start: "20240101"
  end: "20251231"

# === Backtest ===
backtest:
  initial_capital: 1000000.0
  commission: 0.0003            # 万三
  slippage: 0.001               # 0.1%
  stamp_tax: 0.0005             # A股卖出单边印花税
  enable_realistic_costs: true  # 默认含印花税+滑点（老脚本可传 false 复现零成本基线）
  freq: "1d"
  position_sizing:
    min_buy_amount: 2000.0
    max_buy_amount: 20000.0
    lot_size: 100
    min_lots: 1

# === Stop-Profit / Stop-Loss ===
stop_loss:
  cost_stop:
    enabled: true
    threshold: -0.12
  trailing_stop:
    enabled: true
    activation: 0.08
    drawdown: 0.05
  ladder_tp:
    enabled: true
    levels:
      - profit: 0.06
        sell_ratio: 0.30
      - profit: 0.15
        sell_ratio: 0.30
  time_stop:
    enabled: true
    max_hold_days: 20

# === Benchmark ===
benchmark:
  indices:
    - "shanghai"
    - "hs300"
    - "zz500"
    - "chuangyeban"
    - "kechuang50"
    - "zhongzhengA500"
  normalize_start: true

# === Report ===
report:
  formats: ["html", "json"]
  include_trade_log: true
  include_benchmark_chart: true
  plot_engine: "plotly"         # plotly | matplotlib | both
  dpi: 300
  output_dir: ""                # 空则使用 output/reports/

# === Logging ===
logging:
  level: "INFO"
  file: ""                      # 空则仅控制台
  max_size_mb: 100
  backup_count: 5
