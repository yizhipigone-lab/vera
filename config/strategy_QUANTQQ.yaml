strategy:
  name: "GS_QUANTQQ_LONGTERM"

selection:
  formula_name: "QUANTQQ"
  formula_arg: ""
  universe:
    type: "50"
    exclude_st: true
  period: "1d"
  dividend_type: 1

# 区间: 2020.1.1 ~ 2026.7.3
time_range:
  start: "20200101"
  end: "20260703"

backtest:
  initial_capital: 1000000.0
  commission: 0.0003
  slippage: 0.001
  position_sizing:
    min_buy_amount: 2000.0
    max_buy_amount: 20000.0
    lot_size: 100
    min_lots: 1

# 5m 参数优化冠军结构(2026-07-19 起生效, 依据 docs/audit/2026-07-18_QUANTQQ_5m参数优化报告.md §九 实盘首选:
# 硬止损 -50%(≈仅防退市灾难) / 移动止盈 6% 激活 + 0.3% 回撤(执行可行性放宽) / 阶梯全关 / 60 天)
# 替换旧"先生前端参数"(快进快出结构, 3 年窗回测 -37.6%/年 已证伪)
#
# 口径声明(2026-07-20 用户拍板接受 1d): 本配置未声明 backtest.period → 引擎默认 1d。
# 移动止盈回撤 0.3% 在日 bar 内几乎必然同根触发, 且假设以距日高 0.3% 成交 → 1d 终审口径下
# 绝对年化偏乐观, 结论按"相对排序"读(与 5m 报告 §八.3 同一警告)。
stop_loss:
  priority: "trailing_first"   # 移动止盈优先(5m 报告口径)
  cost_stop:
    enabled: true
    threshold: -0.50
  trailing_stop:
    enabled: true
    activation: 0.06
    drawdown: 0.003
  ladder_tp:
    enabled: false
    levels:
      - profit: 0.03
        sell_ratio: 0.20
      - profit: 0.13
        sell_ratio: 0.60
  time_stop:
    enabled: true
    max_hold_days: 60
  cond_time_stop:
    enabled: false
    days: 7
    profit: 0.015
  first_day:
    enabled: false
